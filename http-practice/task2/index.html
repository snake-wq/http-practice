<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP Практика</title>
</head>
<body>
    <h1>Практика HTTP</h1>
    <h2>Гудков Пётр и Медведев Матвей</h2>

    <button id="getPosts">Все посты</button>
    <button id="getPost5">Один пост №5</button>
    <button id="getPostsUser1">Посты пользователя 1</button>
    <button id="getCommentsPost3">Комментарии к посту 3</button>
    <button id="createPost">Создать пост</button>
    <button id="updatePost5">Полное обновление поста 5</button>
    <button id="patchPost5">Частичное обновление поста 5</button>
    <button id="deletePost5">Удалить пост 5</button>

    <!-- Область для вывода результатов запросов -->
    <div id="output">
        <h3>Результат:</h3>
        <pre id="result">Здесь будет результат запроса...</pre>
    </div>

    <!-- Подключаем файл со скриптами -->
    <script src="script.js"></script>
